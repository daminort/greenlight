services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Migrations Service
  migrations:
    image: migrate/migrate
    container_name: db_migrations
    volumes:
      - ./migrations:/migrations
    depends_on:
      db:
        condition: service_healthy
    command:
      - -path=/migrations/
      - -database=postgres://${DB_USER}:${DB_PWD}@db:${DB_PORT}/${DB_NAME}?sslmode=disable
      - up

volumes:
  db_data:
